animations {
  enabled = true

  bezier = easeOutQuint, 0.22, 1, 0.36, 1
  bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
  bezier = softSpring, 0.16, 1, 0.3, 1

  animation = windows, 1, 6, softSpring
  animation = windowsOut, 1, 5, easeInOutCubic, popin 80%
  animation = border, 1, 8, easeOutQuint
  animation = borderangle, 1, 10, easeOutQuint
  animation = fade, 1, 7, easeInOutCubic
  animation = workspaces, 1, 6, softSpring, slidefade 18%
}
